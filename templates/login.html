<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Helpdesk Ticket Classifier - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Three.js and Vanta.js for 3D animated background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
</head>
<body id="vanta-bg" class="min-vh-100 d-flex flex-column">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow" style="opacity: 0.95;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-headset me-2 text-warning"></i>AI Ticket Classifier
            </a>
            <div class="ms-auto">
                <a class="btn btn-warning text-dark px-3 shadow-sm" href="/register">Get Started</a>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex align-items-center justify-content-center" style="margin-top: 80px; position: relative; z-index: 10;">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 rounded-4 mt-5 glass-card">
                    <div class="card-header bg-dark text-white text-center py-4 border-0 rounded-top-4">
                        <h3 class="font-weight-light my-2 fw-bold"><i class="fas fa-sign-in-alt me-2 text-warning"></i>Login</h3>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} shadow-sm rounded-3">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        <form action="/login" method="POST">
                            <div class="form-floating mb-3">
                                <input class="form-control rounded-3" id="inputEmail" type="email" name="email" placeholder="name@example.com" required />
                                <label for="inputEmail"><i class="fas fa-envelope me-2 text-muted"></i>Email address</label>
                            </div>
                            <div class="form-floating mb-3 position-relative">
                                <input class="form-control rounded-3" id="inputPassword" type="password" name="password" placeholder="Password" required />
                                <label for="inputPassword"><i class="fas fa-lock me-2 text-muted"></i>Password</label>
                                <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-decoration-none text-muted" onclick="togglePasswordVisibility('inputPassword', 'toggleIcon')">
                                    <i class="fas fa-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" id="inputRememberPassword" type="checkbox" name="remember" />
                                <label class="form-check-label text-muted" for="inputRememberPassword">Remember Password</label>
                            </div>
                            <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                <button class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow hover-lift" type="submit">Login</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer bg-light text-center py-3 border-0 rounded-bottom-4">
                        <div class="small"><a href="/register" class="text-decoration-none fw-semibold">Need an account? Sign up!</a></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Password Visibility Toggle
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        // Initialize Vanta 3D Background
        document.addEventListener('DOMContentLoaded', function() {
            if (window.VANTA) {
                VANTA.NET({
                    el: "#vanta-bg",
                    mouseControls: true,
                    touchControls: true,
                    gyroControls: false,
                    minHeight: 200.00,
                    minWidth: 200.00,
                    scale: 1.00,
                    scaleMobile: 1.00,
                    color: 0x0d6efd,
                    backgroundColor: 0x1a1a2e,
                    points: 12.00,
                    maxDistance: 22.00,
                    spacing: 18.00
                });
            }
        });
    </script>
</body>
</html>
