<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridge - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-brain me-2"></i>SkillBridge
            </a>
            <div class="ms-auto">
                <a class="btn btn-outline-light px-3 me-2" href="/login">Login</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0 rounded-lg mt-5">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <h3 class="font-weight-light my-2">Create Account</h3>
                    </div>
                    <div class="card-body p-4">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }}">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        <form action="/register" method="POST">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="inputFullName" type="text" name="full_name" placeholder="John Doe" required />
                                <label for="inputFullName">Full Name</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input class="form-control" id="inputEmail" type="email" name="email" placeholder="name@example.com" required />
                                <label for="inputEmail">Email address</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input class="form-control" id="inputPassword" type="password" name="password" placeholder="Create a password" required />
                                <label for="inputPassword">Password</label>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Role</label>
                                <select class="form-select" name="role" id="roleSelect" onchange="toggleStudentFields()">
                                    <option value="student">Student</option>
                                    <option value="placement_officer">Placement Officer</option>
                                </select>
                            </div>

                            <div id="studentFields">
                                <div class="form-floating mb-3">
                                    <input class="form-control" id="inputRollNumber" type="text" name="roll_number" placeholder="Roll Number" />
                                    <label for="inputRollNumber">Roll Number</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input class="form-control" id="inputDepartment" type="text" name="department" placeholder="Department" />
                                    <label for="inputDepartment">Department</label>
                                </div>
                            </div>

                            <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                <button class="btn btn-primary w-100" type="submit">Register</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center py-3">
                        <div class="small"><a href="/login">Have an account? Go to login</a></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleStudentFields() {
            const role = document.getElementById('roleSelect').value;
            const studentFields = document.getElementById('studentFields');
            const rollInput = document.getElementById('inputRollNumber');
            const deptInput = document.getElementById('inputDepartment');
            
            if (role === 'student') {
                studentFields.style.display = 'block';
                rollInput.required = true;
                deptInput.required = true;
            } else {
                studentFields.style.display = 'none';
                rollInput.required = false;
                deptInput.required = false;
            }
        }
        
        // Run once on load to set initial state
        document.addEventListener('DOMContentLoaded', toggleStudentFields);
    </script>
</body>
</html>
