<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Helpdesk Ticket Classifier - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Three.js and Vanta.js for 3D animated background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
</head>
<body id="vanta-bg" class="min-vh-100 d-flex flex-column">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow" style="opacity: 0.95;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-headset me-2 text-warning"></i>AI Ticket Classifier
            </a>
            <div class="ms-auto">
                <a class="btn btn-outline-light px-3 me-2 shadow-sm glass-btn" href="/login">Login</a>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex align-items-center justify-content-center" style="margin-top: 80px; position: relative; z-index: 10;">
        <div class="row w-100 justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card shadow-lg border-0 rounded-4 mt-5 mb-5 glass-card">
                    <div class="card-header bg-dark text-white text-center py-4 border-0 rounded-top-4">
                        <h3 class="font-weight-light my-2 fw-bold"><i class="fas fa-user-plus me-2 text-warning"></i>Create Account</h3>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} shadow-sm rounded-3">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        <form action="/register" method="POST">
                            <div class="form-floating mb-3">
                                <input class="form-control rounded-3" id="inputFullName" type="text" name="full_name" placeholder="John Doe" required />
                                <label for="inputFullName"><i class="fas fa-user me-2 text-muted"></i>Full Name</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input class="form-control rounded-3" id="inputEmail" type="email" name="email" placeholder="name@example.com" required />
                                <label for="inputEmail"><i class="fas fa-envelope me-2 text-muted"></i>Email address</label>
                            </div>
                            <div class="form-floating mb-2 position-relative">
                                <input class="form-control rounded-3" id="inputPassword" type="password" name="password" placeholder="Create a password" required oninput="checkPasswordStrength()" />
                                <label for="inputPassword"><i class="fas fa-lock me-2 text-muted"></i>Password</label>
                                <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-decoration-none text-muted" onclick="togglePasswordVisibility('inputPassword', 'toggleIcon')">
                                    <i class="fas fa-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                            <!-- Password Strength Indicator -->
                            <div class="progress mb-3" style="height: 5px;">
                                <div id="password-strength-bar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                            <small id="password-strength-text" class="form-text text-muted d-block mb-3"></small>
                            
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold"><i class="fas fa-id-badge me-2"></i>Role</label>
                                <select class="form-select rounded-3 py-2" name="role" id="roleSelect" onchange="toggleStudentFields()">
                                    <option value="student">Helpdesk Agent</option>
                                    <option value="placement_officer">Admin / Manager</option>
                                </select>
                            </div>

                            <div id="studentFields">
                                <div class="form-floating mb-3">
                                    <input class="form-control rounded-3" id="inputRollNumber" type="text" name="roll_number" placeholder="Agent ID" />
                                    <label for="inputRollNumber"><i class="fas fa-hashtag me-2 text-muted"></i>Agent ID</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input class="form-control rounded-3" id="inputDepartment" type="text" name="department" placeholder="Department" />
                                    <label for="inputDepartment"><i class="fas fa-building me-2 text-muted"></i>Department</label>
                                </div>
                            </div>

                            <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                <button class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow hover-lift" type="submit">Register Account</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer bg-light text-center py-3 border-0 rounded-bottom-4">
                        <div class="small"><a href="/login" class="text-decoration-none fw-semibold">Have an account? Go to login</a></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleStudentFields() {
            const role = document.getElementById('roleSelect').value;
            const studentFields = document.getElementById('studentFields');
            const rollInput = document.getElementById('inputRollNumber');
            const deptInput = document.getElementById('inputDepartment');
            
            if (role === 'student') {
                studentFields.style.display = 'block';
                rollInput.required = true;
                deptInput.required = true;
            } else {
                studentFields.style.display = 'none';
                rollInput.required = false;
                deptInput.required = false;
            }
        }
        
        // Password Visibility Toggle
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        // Password Strength Checker
        function checkPasswordStrength() {
            const password = document.getElementById('inputPassword').value;
            const strengthBar = document.getElementById('password-strength-bar');
            const strengthText = document.getElementById('password-strength-text');

            let strength = 0;
            if (password.length > 0) {
                if (password.length > 5) strength += 25;
                if (password.match(/[a-z]+/)) strength += 25;
                if (password.match(/[A-Z]+/)) strength += 25;
                if (password.match(/[0-9]+/) || password.match(/[\W]+/)) strength += 25;
            }

            strengthBar.style.width = strength + '%';

            if (strength === 0) {
                strengthBar.className = 'progress-bar';
                strengthText.innerText = '';
            } else if (strength < 50) {
                strengthBar.className = 'progress-bar bg-danger';
                strengthText.innerText = 'Weak';
                strengthText.className = 'form-text text-danger d-block mb-3';
            } else if (strength < 100) {
                strengthBar.className = 'progress-bar bg-warning';
                strengthText.innerText = 'Moderate';
                strengthText.className = 'form-text text-warning d-block mb-3';
            } else {
                strengthBar.className = 'progress-bar bg-success';
                strengthText.innerText = 'Strong';
                strengthText.className = 'form-text text-success d-block mb-3';
            }
        }

        // Initialize Vanta 3D Background
        document.addEventListener('DOMContentLoaded', function() {
            toggleStudentFields(); // Initialize field visibility

            if (window.VANTA) {
                VANTA.NET({
                    el: "#vanta-bg",
                    mouseControls: true,
                    touchControls: true,
                    gyroControls: false,
                    minHeight: 200.00,
                    minWidth: 200.00,
                    scale: 1.00,
                    scaleMobile: 1.00,
                    color: 0x0d6efd,
                    backgroundColor: 0x1a1a2e,
                    points: 12.00,
                    maxDistance: 22.00,
                    spacing: 18.00
                });
            }
        });
    </script>
</body>
</html>
